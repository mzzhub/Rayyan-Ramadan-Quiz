<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Categories</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
background:white;
padding:50px;
border-radius:15px;
text-align:center;
width:90%;
max-width:420px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h1{
margin-bottom:10px;
color:#222;
}

.subtitle{
margin-bottom:30px;
color:#666;
font-size:15px;
}

.logo{
width:350px;
margin-bottom:15px;
}

.logo-box{
width:100%;
padding:10px 30px 20px 30px;
display:flex;
justify-content:center;
align-items:center;
}

.logo-box img{
width:100%;
max-width:200px;
height:auto;
object-fit:contain;
}

.button{
display:block;
width:100%;
padding:15px;
margin:12px 0;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
transition:0.25s;
}

.kids{
background:#27ae60;
}

.junior{
background:#f39c12;
}

.senior{
background:#e74c3c;
}

.button:hover{
transform:scale(1.05);
opacity:0.9;
}

.footer{
margin-top:25px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<div class="logo-box">
<img src="logo.png" alt="School Logo">
</div>

<h1>Ramadan Quiz Competition</h1>
<p class="subtitle">RAYYAN RAMADAN CAMPAIGN</p>

<button class="button kids"
onclick="openForm('https://forms.gle/4Gc8YQFXfLxYdQ6q8')">
Category 01
(Class 1 - 4)
</button>

<button class="button junior"
onclick="openForm('https://forms.gle/dhzeTovhiM8qvsJT7')">
Category 02
(Class 5 - 7)
</button>

<button class="button senior"
onclick="openForm('https://forms.gle/2JYeLDC9KSk3bfUP6')">
Category 03
(Class 8 - 10)
</button>

<div class="footer">
Choose the correct category before starting the quiz
</div>

</div>

<script>

function openForm(link){
window.location.href = link;
}

</script>

</body>
</html>
